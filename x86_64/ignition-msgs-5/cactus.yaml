nvchecker:
  - source: aur
    aur:
  - source: archpkg
    archpkg: protobuf
    from_pattern: '-.*'
    to_pattern: ''
depends:
  - x86_64/ignition-math-6
  - x86_64/ignition-tools-1
  - x86_64/ignition-utils-1
makedepends:
  - x86_64/ignition-cmake-2
build_prefix: extra-x86_64
makepkg_args: --nocheck
pre_build: |
  aur-pre-build
  git checkout HEAD -- protobuf-stringview.patch
  echo 'export LDFLAGS="-Wl,--copy-dt-needed-entries"' >> PKGBUILD
  cat >> PKGBUILD << 'PREPARE'
  prepare() {
    cd "${srcdir}/${_dir}"
    patch -Np1 < "$startdir/protobuf-stringview.patch"
  }
  PREPARE
post_build: aur-post-build
