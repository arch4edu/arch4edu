nvchecker:
  - source: aur
    aur:
depends:
  - x86_64/r/r-cli
  - x86_64/r/r-crayon
  - x86_64/r/r-digest
  - x86_64/r/r-httr
  - x86_64/r/r-jsonlite
  - x86_64/r/r-rex
  - x86_64/r/r-withr
  - x86_64/r/r-yaml
build_prefix: extra-x86_64
makepkg_args: --nocheck
pre_build: |
  aur-pre-build
  replace -u '3.6.4' '3.6.5'
  sed -i '6,7d' fix-tests.patch
  sed -i 's/attr(res, "status") == 0L/identical(attr(res, "status"), 0L)/' fix-tests.patch
  sed -i 's/@@ -194,6 +194,7 @@/@@ -194,4 +194,5 @@/' fix-tests.patch
  replace 'd3729dbb95789a8622860678ed9fdb7a' '04b8eae75e6b95e2cc037db977d1191a'
post_build: aur-post-build
