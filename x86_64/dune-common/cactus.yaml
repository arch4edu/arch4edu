nvchecker:
  - source: aur
    aur:
  - alias: python
depends:
  - x86_64/python-portalocker
build_prefix: extra-x86_64
makepkg_args: --skippgpcheck
pre_build: |
  aur-pre-build
  add makedepends python-build python-installer
  sed -i 's|rm -r "${pkgdir}/tmp"|rm -rf "${pkgdir}/tmp"|' PKGBUILD
post_build: aur-post-build
