nvchecker:
  - source: aur
    aur:
depends:
  - x86_64/kokkos
build_prefix: extra-x86_64
pre_build: |
  aur-pre-build
  sed 's/cmake_configuration_flags+=" -DCMAKE_POLICY_VERSION_MINIMUM=3.5"/cmake_configuration_flags+=" -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DDEAL_II_COMPONENT_PYTHON_BINDINGS=ON"/' -i PKGBUILD
post_build: aur-post-build
