nvchecker:
  - source: aur
    aur:
depends:
  - x86_64/ignition-msgs-5
  - x86_64/ignition-tools-1
makedepends:
  - x86_64/ignition-cmake-2
build_prefix: extra-x86_64
makepkg_args: --nocheck
pre_build: |
  aur-pre-build
  add makedepends cppzmq
  cat > fix-stringview.sh << 'SCRIPT'
  #!/bin/bash
  find src include \( -name "*.cc" -o -name "*.hh" \) | grep -v TEST | xargs \
    perl -pi -e 's/((?:\w+(?:::\w+)*(?:\(\))?(?:->|\.))+)GetTypeName\(\)/std::string(${1}GetTypeName())/g'
  SCRIPT
  chmod +x fix-stringview.sh
  sed -i '/patch -Np1 -i ${srcdir}\/protobuf-stubs-casts.patch/a\    bash ${startdir}/fix-stringview.sh' PKGBUILD
post_build: aur-post-build
