nvchecker:
  - source: aur
    aur:
depends:
  - x86_64/ignition-msgs-5
  - x86_64/ignition-tools-1
makedepends:
  - x86_64/ignition-cmake-2
build_prefix: extra-x86_64
makepkg_args: --nocheck
pre_build: |
  aur-pre-build
  add makedepends cppzmq
  git checkout HEAD -- protobuf-stringview.patch
  sed -i '/patch -Np1 -i ${srcdir}\/protobuf-stubs-casts.patch/a\    patch -Np1 -i ${startdir}/protobuf-stringview.patch' PKGBUILD
post_build: aur-post-build
