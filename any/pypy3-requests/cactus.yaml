nvchecker:
  - source: aur
    aur:
depends:
  - any/pypy3-charset-normalizer
  - any/pypy3-idna
  - any/pypy3-urllib3
makedepends:
  - any/pypy3-build
  - any/pypy3-installer
  - any/pypy3-setuptools
build_prefix: extra-x86_64
makepkg_args: --nocheck --skipinteg
pre_build: |
  aur-pre-build
  sed -i '/certs.patch/d' PKGBUILD
  sed -i '/^source=(/s/$/)/' PKGBUILD
post_build: aur-post-build
