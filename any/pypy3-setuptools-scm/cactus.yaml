nvchecker:
  - source: aur
    aur:
depends:
  - any/pypy3-packaging
  - any/pypy3-setuptools
makedepends:
  - any/pypy3-build
  - any/pypy3-installer
build_prefix: extra-x86_64
makepkg_args: --nocheck
pre_build: |
  aur-pre-build
  sed -i 's/cd ${_base}-${_base}-${pkgver}/cd ${_base}-${_base}-v${pkgver}/g' PKGBUILD
  sed -i 's|install -Dm 644 LICENSE|install -Dm 644 setuptools-scm/LICENSE|' PKGBUILD
post_build: aur-post-build
